name: vault_x
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # ── State ─────────────────────────────────────────────────────────
  provider: ^6.1.2

  # ── Crypto ────────────────────────────────────────────────────────
  argon2: ^1.0.1
  cryptography: ^2.7.0
  pointycastle: ^3.9.1
  crypto: ^3.0.5
  ffi: ^2.1.2

  # ── Database ──────────────────────────────────────────────────────
  drift: ^2.20.0
  drift_flutter: ^0.1.0
  sqlite3: ^2.4.7
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # ── Key storage ───────────────────────────────────────────────────
  flutter_secure_storage: ^9.2.2

  # ── Backend ───────────────────────────────────────────────────────
  supabase_flutter: ^2.8.0

  # ── Auth ──────────────────────────────────────────────────────────
  local_auth: ^2.3.0
  local_auth_android: ^1.0.37

  # ── Password tools ────────────────────────────────────────────────
  zxcvbn: ^1.0.0
  http: ^1.2.2

  # ── File handling ─────────────────────────────────────────────────
  file_picker: ^8.0.7

  # ── Navigation ────────────────────────────────────────────────────
  go_router: ^14.3.0

  # ── Android-only ──────────────────────────────────────────────────
  flutter_windowmanager_plus: ^1.0.1
  flutter_jailbreak_detection: ^1.10.0

  # ── Utilities ─────────────────────────────────────────────────────
  device_info_plus: ^10.1.2
  connectivity_plus: ^6.1.0
  logger: ^2.4.0

  # ── UUID ──────────────────────────────────────────────────────────
  uuid: ^4.4.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.4.13
  drift_dev: ^2.20.0
  mockito: ^5.4.4
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
